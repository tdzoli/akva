<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaControl Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; text-align: center; padding: 20px; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 400px; margin: 10px auto; }
        .status { font-size: 22px; font-weight: bold; color: #007bff; }
        button { background: #28a745; color: white; border: none; padding: 15px 30px; border-radius: 10px; cursor: pointer; margin: 5px; }
        .off { background: #dc3545; }
    </style>
</head>
<body>
    <h1>🌊 AquaControl v1.1</h1>
    
    <div class="card">
        <h3>Szenzor Adatok (Node A)</h3>
        <div id="ph-display" class="status">Várakozás...</div>
    </div>

    <div class="card">
        <h3>Beavatkozó Állapot (Node B)</h3>
        <div id="actuator-display" class="status">Ismeretlen</div>
    </div>

    <div class="card">
        <h3>Vezérlés</h3>
        <button onclick="sendControl('1')">LED BE</button>
        <button class="off" onclick="sendControl('0')">LED KI</button>
    </div>

    <p id="log" style="font-size: 12px; color: gray;">Csatlakozás...</p>

    <script>
        const host = 'wss://4769a5772b894e1ea634b4eff4b1c6cd.s1.eu.hivemq.cloud:8884/mqtt';
        const options = {
            clientId: 'WebDash_' + Math.random().toString(16).substr(2, 5),
            username: 'akva_admin', 
            password: 'Akva123456'
        };

        const client = mqtt.connect(host, options);

        client.on('connect', () => {
            document.getElementById('log').innerText = "Online";
            // Erre a háromra iratkozunk fel, hogy lássunk mindent
            client.subscribe('aquarium/sensor/data');
            client.subscribe('aquarium/status');
        });

        client.on('message', (topic, message) => {
            const msgStr = message.toString();
            console.log("Érkezett:", topic, msgStr);

            try {
                const data = JSON.parse(msgStr);
                
                // Ha a Szenzor Node küld adatot (ph)
                if (data.ph !== undefined) {
                    document.getElementById('ph-display').innerText = "Nyers pH (A0): " + data.ph;
                }
                
                // Ha a Gerinc küld összesített állapotot (actuator)
                if (data.actuator !== undefined) {
                    document.getElementById('actuator-display').innerText = 
                        data.actuator === 1 ? "💡 Világítás BE" : "🌑 Világítás KI";
                }
            } catch(e) {
                // Ha nem JSON jön, de látni akarjuk
                document.getElementById('log').innerText = "Nyers üzenet: " + msgStr;
            }
        });

        function sendControl(val) {
            client.publish('aquarium/control', val);
            document.getElementById('log').innerText = "Parancs küldve: " + val;
        }
    </script>
</body>
</html>
